# SonarCloud配置文件
# 项目基本信息
sonar.projectKey=wua520_GL-APP
sonar.organization=wua520

# 项目名称和版本
sonar.projectName=GL Fitness Training App
sonar.projectVersion=1.0

# 源代码路径
sonar.sources=app/src/main/java,fitness-server/src/main/java
sonar.java.binaries=app/build/intermediates/javac,fitness-server/target/classes

# 排除不需要扫描的文件
sonar.exclusions=**/build/**,**/target/**,**/*.xml,**/*.gradle,**/res/**,**/test/**

# 编码格式
sonar.sourceEncoding=UTF-8

# 语言设置
sonar.language=java,kotlin
